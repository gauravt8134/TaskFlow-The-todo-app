
services:
  mongo:
    image: mongo:4.4
    container_name: taskflow-mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - taskflow-net
 
  backend:
    build: ./backend
    container_name: taskflow-backend
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskflow
      - JWT_SECRET=taskflow_secret
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - taskflow-net
 
  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taskflow-net
 
volumes:
  mongo-data:
 
networks:
  taskflow-net:
    driver: bridge
 